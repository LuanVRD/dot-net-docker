version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: taskmanager-db
    environment:
      - POSTGRES_DB=taskdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - task-network

  web:
    build:
      context: ./src/TaskManager.API
      dockerfile: Dockerfile
    container_name: taskmanager-web
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=taskdb;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy
    networks:
      - task-network

volumes:
  postgres_data:

networks:
  task-network:
    driver: bridge
